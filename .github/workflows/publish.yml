name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install

      - name: Run Build (TypeScript)
        run: pnpm run build

      - name: Pre-build Docker Image
        run: docker build -t ai-jail-sandbox -f docker/Dockerfile docker/

      - name: Run Tests
        run: pnpm run test

      - name: Publish to NPM
        run: npm publish --access public --provenance
